<header class="h-16 bg-white dark:bg-darkCard border-b border-slate-200 dark:border-slate-800 shadow-sm flex items-center justify-between px-8 z-0 transition-colors duration-200">
    <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100">{% block header_title %}Centro de Inteligencia Comercial{% endblock %}</h2>
    <div class="flex items-center gap-4">
        <!-- Centro de Actividad -->
        <div class="flex flex-col items-end mr-4 hidden md:flex">
            <div class="flex items-center gap-2 text-[10px] uppercase font-bold text-slate-500 dark:text-slate-400">
                <span>BD MySQL</span>
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
            </div>
            <div class="flex items-center gap-2 text-[10px] uppercase font-bold text-slate-500 dark:text-slate-400 mt-0.5">
                <span>Motor Apriori</span>
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
            </div>
        </div>
        
        <span class="text-sm text-slate-500 dark:text-slate-400" id="current-time"></span>
        <div class="h-8 w-8 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm shadow-md">
            A
        </div>
    </div>
</header>
