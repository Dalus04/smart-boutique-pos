<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Boutique POS{% endblock %}</title>
    <!-- Tailwind CSS (via CDN for Phase 1) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#10b981',
                        darkBg: '#020617',
                        darkCard: '#0f172a',
                        lightBg: '#f1f5f9',
                        lightCard: '#ffffff'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .card {
                @apply bg-white dark:bg-darkCard rounded-xl shadow-sm border border-slate-200 dark:border-slate-800;
            }
            .btn-primary {
                @apply bg-primary hover:bg-blue-700 text-white rounded-lg font-bold transition-all shadow-sm flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed;
            }
            .btn-secondary {
                @apply bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-800 dark:text-white rounded-lg font-bold transition-all shadow-sm flex items-center justify-center gap-2;
            }
            .btn-danger {
                @apply bg-red-50 hover:bg-red-100 dark:bg-red-500/10 dark:hover:bg-red-500/20 text-red-500 hover:text-red-700 rounded-lg font-bold transition-colors flex items-center justify-center gap-2;
            }
            .input-base {
                @apply w-full border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500;
            }
        }
    </style>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block head %}{% endblock %}
</head>
<body class="bg-lightBg text-slate-800 dark:bg-darkBg dark:text-slate-200 transition-colors duration-200 font-sans h-screen flex overflow-hidden">
    
    <!-- Sidebar -->
    {% include 'components/sidebar.html' %}

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        {% include 'components/topbar.html' %}
        
        <div class="flex-1 overflow-auto p-8 bg-lightBg dark:bg-darkBg">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Base Scripts -->
    <script src="/static/js/core.js"></script>
    <script src="/static/js/api_client.js?v=5.3"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
