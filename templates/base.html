<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Boutique POS{% endblock %}</title>
    <!-- Tailwind CSS (via CDN for Phase 1) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#10b981',
                        darkBg: '#020617',
                        darkCard: '#0f172a',
                        lightBg: '#f1f5f9',
                        lightCard: '#ffffff'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .card {
                @apply bg-white dark:bg-darkCard rounded-xl shadow-sm border border-slate-200 dark:border-slate-800;
            }
            .btn-primary {
                @apply bg-primary hover:bg-blue-700 text-white rounded-lg font-bold transition-all shadow-sm flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed;
            }
            .btn-secondary {
                @apply bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-800 dark:text-white rounded-lg font-bold transition-all shadow-sm flex items-center justify-center gap-2;
            }
            .btn-danger {
                @apply bg-red-50 hover:bg-red-100 dark:bg-red-500/10 dark:hover:bg-red-500/20 text-red-500 hover:text-red-700 rounded-lg font-bold transition-colors flex items-center justify-center gap-2;
            }
            .input-base {
                @apply w-full border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500;
            }
            .nav-active {
                @apply bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 font-medium !important;
            }
            .form-label {
                @apply block text-xs font-bold text-gray-600 dark:text-gray-300 uppercase mb-1;
            }
            .form-label-sm {
                @apply block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1;
            }
            .section-label {
                @apply text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 border-b border-gray-100 dark:border-gray-700 pb-2;
            }
            .info-panel {
                @apply bg-gray-50 dark:bg-gray-900/40 p-3 rounded-xl border border-gray-100 dark:border-gray-700;
            }
            .modal-backdrop {
                @apply fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 opacity-0 transition-opacity duration-300 backdrop-blur-sm;
            }
            .modal-panel {
                @apply bg-white dark:bg-darkCard rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 transform scale-95 transition-transform duration-300 overflow-hidden;
            }
            .modal-header {
                @apply p-4 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 flex justify-between items-center;
            }
            .modal-footer {
                @apply p-4 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 flex justify-end gap-3;
            }
            .table-container {
                @apply bg-white dark:bg-darkCard rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 flex-1 flex flex-col overflow-hidden relative;
            }
            .table-toolbar {
                @apply p-4 border-b border-gray-100 dark:border-gray-700/50 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between shrink-0 bg-white dark:bg-darkCard;
            }
            .table-wrapper {
                @apply overflow-x-auto overflow-y-auto flex-1;
            }
            .table-base {
                @apply w-full text-left border-collapse whitespace-nowrap;
            }
            .table-thead {
                @apply bg-gray-50 dark:bg-gray-800/60 sticky top-0 z-10 shadow-sm;
            }
            .table-th {
                @apply py-4 px-4 text-xs font-bold text-gray-600 dark:text-gray-300 uppercase tracking-wider;
            }
            .table-tbody {
                @apply divide-y divide-gray-200 dark:divide-gray-700/60 text-sm;
            }
            .table-row {
                @apply hover:bg-gray-50/50 dark:hover:bg-gray-800/50 transition-colors;
            }
            .table-td {
                @apply py-3 px-4;
            }
            .table-footer {
                @apply p-3 border-t border-gray-100 dark:border-gray-700 bg-gray-50/70 dark:bg-gray-800/20 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs shrink-0;
            }
            .table-footer-info {
                @apply text-gray-500 font-medium;
            }
            .table-loading {
                @apply absolute inset-0 bg-white/80 dark:bg-darkCard/80 z-20 flex items-center justify-center hidden;
            }
            .table-empty {
                @apply hidden p-12 text-center text-gray-500 dark:text-gray-400 flex flex-col items-center justify-center;
            }
            .kpi-value {
                @apply text-2xl font-black text-slate-800 dark:text-white;
            }
            .kpi-variation {
                @apply text-xs text-slate-500 dark:text-slate-400 mt-1 font-semibold;
            }
        }
    </style>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block head %}{% endblock %}
</head>
<body class="bg-lightBg text-slate-800 dark:bg-darkBg dark:text-slate-200 transition-colors duration-200 font-sans h-screen flex overflow-hidden">
    
    <!-- Sidebar -->
    {% include 'components/sidebar.html' %}

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        {% include 'components/topbar.html' %}
        
        <div class="flex-1 overflow-auto p-8 bg-lightBg dark:bg-darkBg">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Global Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Base Scripts -->
    <script src="/static/js/core.js"></script>
    <script src="/static/js/utils.js?v=1"></script>
    <script src="/static/js/api_client.js?v=5.3"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
